name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Derive tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: ${{ env.IMAGE }}-migrate:${{ steps.meta.outputs.tag }}
          cache-from: type=gha

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
      - name: Authenticate to the cluster
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Helm upgrade (runs the migration hook first)
        run: |
          helm upgrade --install ai-gateway ./helm/ai-gateway \
            --namespace ai-gateway --create-namespace \
            -f helm/ai-gateway/values.production.yaml \
            --set image.tag=${{ needs.build-and-push.outputs.tag }} \
            --set secrets.existingSecret=ai-gateway-secrets \
            --wait --timeout 5m
      - name: Smoke test
        id: smoke
        run: |
          kubectl -n ai-gateway rollout status deploy/ai-gateway --timeout=180s
          # Probe readiness through a temporary port-forward.
          kubectl -n ai-gateway port-forward svc/ai-gateway 18080:80 &
          PF_PID=$!
          sleep 5
          curl -fsS http://localhost:18080/ready
          curl -fsS http://localhost:18080/health
          kill $PF_PID
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy or smoke test failed — rolling back."
          helm rollback ai-gateway --namespace ai-gateway || true
          kubectl -n ai-gateway rollout status deploy/ai-gateway --timeout=180s || true
