apiVersion: v1
kind: Service
metadata:
  name: { { include "ai-gateway.fullname" . } }
  labels: { { - include "ai-gateway.labels" . | nindent 4 } }
spec:
  type: { { .Values.service.type } }
  selector: { { - include "ai-gateway.selectorLabels" . | nindent 4 } }
  ports:
    - name: http
      port: { { .Values.service.port } }
      targetPort: http
      protocol: TCP
