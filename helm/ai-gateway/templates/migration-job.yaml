{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ai-gateway.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Run before the Deployment is created/updated, and only once per release.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "ai-gateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: migrate
          image: {{ include "ai-gateway.migrateImage" . }}
          command: ['npm', 'run', 'db:migrate']
          envFrom:
            - secretRef:
                name: {{ include "ai-gateway.secretName" . }}
{{- end }}
