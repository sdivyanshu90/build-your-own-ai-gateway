{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-gateway.fullname" . }}-secrets
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.DATABASE_URL is required when not using an existingSecret" .Values.secrets.DATABASE_URL | quote }}
  REDIS_URL: {{ required "secrets.REDIS_URL is required when not using an existingSecret" .Values.secrets.REDIS_URL | quote }}
  ENCRYPTION_KEY: {{ required "secrets.ENCRYPTION_KEY is required when not using an existingSecret" .Values.secrets.ENCRYPTION_KEY | quote }}
  ADMIN_API_KEY: {{ required "secrets.ADMIN_API_KEY is required when not using an existingSecret" .Values.secrets.ADMIN_API_KEY | quote }}
{{- end }}
