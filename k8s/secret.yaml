# =============================================================================
# TEMPLATE ONLY — do NOT commit real secret values.
#
# Create the real secret out-of-band, e.g.:
#   kubectl -n ai-gateway create secret generic ai-gateway-secrets \
#     --from-literal=DATABASE_URL='postgres://user:pass@host:5432/ai_gateway?sslmode=require' \
#     --from-literal=REDIS_URL='redis://:pass@host:6379' \
#     --from-literal=ENCRYPTION_KEY="$(openssl rand -hex 32)" \
#     --from-literal=ADMIN_API_KEY="$(openssl rand -hex 24)"
#
# In production, prefer an external secret store (Vault / cloud Secrets Manager)
# synced via the External Secrets Operator rather than a raw Secret. The
# placeholders below are intentionally invalid.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ai-gateway-secrets
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
type: Opaque
stringData:
  DATABASE_URL: 'postgres://REPLACE_ME@REPLACE_ME:5432/ai_gateway?sslmode=require'
  REDIS_URL: 'redis://REPLACE_ME:6379'
  # 32-byte hex (openssl rand -hex 32)
  ENCRYPTION_KEY: 'REPLACE_ME_WITH_64_HEX_CHARS'
  # Long random admin token (openssl rand -hex 24)
  ADMIN_API_KEY: 'REPLACE_ME_WITH_A_LONG_RANDOM_TOKEN'
