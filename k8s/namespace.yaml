apiVersion: v1
kind: Namespace
metadata:
  name: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/part-of: ai-gateway
    # Enforce the restricted Pod Security Standard: no privilege escalation,
    # non-root, dropped capabilities. The Deployment's securityContext complies.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
