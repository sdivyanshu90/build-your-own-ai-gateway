apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-gateway-config
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
data:
  # Non-secret configuration only. Secrets (DATABASE_URL, REDIS_URL,
  # ENCRYPTION_KEY, ADMIN_API_KEY) live in the Secret, NOT here.
  NODE_ENV: 'production'
  LOG_LEVEL: 'info'
  LOG_PRETTY: 'false'
  HOST: '0.0.0.0'
  PORT: '8080'
  TRUST_PROXY: 'true'
  MAX_REQUEST_BODY_BYTES: '10485760'
  SHUTDOWN_TIMEOUT_MS: '30000'
  KEEP_ALIVE_TIMEOUT_MS: '72000'

  DATABASE_POOL_MAX: '20'
  DATABASE_POOL_MIN: '2'
  DATABASE_STATEMENT_TIMEOUT_MS: '15000'
  DATABASE_SSL: 'true'

  REDIS_KEY_PREFIX: 'gw:'

  AUTH_CACHE_TTL_SECONDS: '30'
  REGISTRY_CACHE_TTL_SECONDS: '60'
  PROVIDER_TIMEOUT_MS: '60000'

  LOAD_BALANCER_STRATEGY: 'LATENCY_BASED'
  LB_LATENCY_EMA_ALPHA: '0.3'
  LB_FAILURE_PENALTY_MS: '30000'

  CB_FAILURE_THRESHOLD: '5'
  CB_SUCCESS_THRESHOLD: '2'
  CB_TIMEOUT_MS: '30000'
  CB_WINDOW_MS: '60000'
  CB_HALF_OPEN_MAX_PROBES: '1'

  RATE_LIMIT_ENABLED: 'true'
  RATE_LIMIT_DEFAULT_RPM: '60'
  RATE_LIMIT_DEFAULT_TPM: '100000'
  RATE_LIMIT_BURST_ENABLED: 'true'
  RATE_LIMIT_BURST_MULTIPLIER: '2'
  RATE_LIMIT_BURST_WINDOW_MS: '10000'

  CACHE_ENABLED: 'true'
  CACHE_DEFAULT_TTL_SECONDS: '3600'
  CACHE_MAX_VALUE_BYTES: '262144'

  RETRY_MAX_ATTEMPTS: '3'
  RETRY_BASE_DELAY_MS: '200'
  RETRY_MAX_DELAY_MS: '5000'

  METRICS_ENABLED: 'true'
  OTEL_ENABLED: 'true'
  OTEL_SERVICE_NAME: 'ai-gateway'
  OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector.observability:4318'
  OTEL_TRACES_SAMPLER_RATIO: '0.1'

  HEALTH_MONITOR_ENABLED: 'true'
  HEALTH_MONITOR_INTERVAL_MS: '30000'
